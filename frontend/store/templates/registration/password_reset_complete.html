{% extends 'store/base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-sm border border-gray-200 text-center">
        
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 mb-4">
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        
        <h2 class="text-3xl font-extrabold text-gray-900">Password Updated!</h2>
        
        <p class="mt-2 text-sm text-gray-600">
            Your password has been successfully reset. You can now sign in with your new credentials.
        </p>
        
        <div class="mt-8">
            <a href="{% url 'login' %}" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                Sign In
            </a>
        </div>
    </div>
</div>
{% endblock %}
