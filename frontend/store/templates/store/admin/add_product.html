{% extends 'store/admin/admin_base.html' %}

{% block admin_content %}
<div class="max-w-4xl mx-auto">
    
    <!-- Header -->
    <div class="flex items-center gap-4 mb-8">
        <a href="{% url 'admin_products' %}" class="p-2 bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 text-gray-500 hover:text-gray-900 dark:hover:text-white transition">
            ← Back
        </a>
        <div>
            <h1 class="text-3xl font-black text-gray-900 dark:text-white">Add New Product</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Fill out the details below to add an item to your catalog.</p>
        </div>
    </div>

    <!-- The Form -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm p-6 md:p-8">
        <form action="{% url 'admin_add_product' %}" method="POST" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- Product Name -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Product Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., ASUS Gaming Laptop">
                </div>

                <!-- Category -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Category</label>
                    <select name="category" required class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                        <option value="smartphones">Smartphones</option>
                        <option value="laptops">Laptops & PCs</option>
                        <option value="audio">Audio & Headphones</option>
                        <option value="mens-clothing">Men's Clothing</option>
                        <option value="womens-clothing">Women's Clothing</option>
                        <option value="sneakers">Sneakers & Shoes</option>
                    </select>
                </div>

                <!-- Image URL -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Image URL</label>
                    <input type="url" name="image" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="https://example.com/image.jpg">
                </div>

                <!-- Price -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Price (৳)</label>
                    <input type="number" step="0.01" name="price" required class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="45000">
                </div>

                <!-- Stock -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Stock Quantity</label>
                    <input type="number" name="stock" required class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="50">
                </div>

                <!-- Description -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Description</label>
                    <textarea name="description" rows="4" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter product details..."></textarea>
                </div>

            </div>

            <!-- Submit Button -->
            <div class="flex justify-end pt-4 border-t border-gray-100 dark:border-gray-700 mt-6">
                <button type="submit" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition shadow-md">
                    Save Product
                </button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
