{% extends 'store/admin/admin_base.html' %}

{% block admin_content %}
<div class="max-w-md w-full space-y-8 bg-white dark:bg-gray-800 p-10 rounded-3xl shadow-2xl border border-gray-100 dark:border-gray-700">
    <div>
        <h2 class="mt-2 text-center text-3xl font-black text-gray-900 dark:text-white tracking-tight">Admin Portal</h2>
        <p class="mt-2 text-center text-sm font-medium text-blue-600 dark:text-blue-400 uppercase tracking-wider">Authorized Personnel Only</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-4 rounded-xl text-sm font-bold text-center border border-red-100 dark:border-red-900">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form class="mt-8 space-y-6" action="{% url 'admin_login' %}" method="POST">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label class="text-sm font-bold text-gray-700 dark:text-gray-300">Staff Email</label>
                <input name="email" type="email" required class="appearance-none rounded-xl block w-full px-4 py-3.5 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 mt-1" placeholder="rayhan@mrustore.com">
            </div>
            <div>
                <label class="text-sm font-bold text-gray-700 dark:text-gray-300">Password</label>
                <input name="password" type="password" required class="appearance-none rounded-xl block w-full px-4 py-3.5 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 mt-1" placeholder="••••••••">
            </div>
        </div>

        <button type="submit" class="w-full flex justify-center py-3.5 px-4 text-sm font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-700 transition-all shadow-lg hover:shadow-blue-500/30 transform hover:-translate-y-0.5">
            Access Secure Dashboard
        </button>
    </form>
</div>
{% endblock %}
