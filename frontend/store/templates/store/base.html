<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The mRu Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-xl font-bold">The-mRu-store</a>
            <div>
                <a href="/" class="px-3 hover:text-blue-200">Catalog</a>
                <a href="/chat/" class="px-3 hover:text-blue-200">🤖 AI Assistant</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto flex-grow p-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 text-white text-center p-4 mt-8">
        <p>&copy; 2026 The mRu Store. Powered by AI.</p>
    </footer>
</body>
</html>
