{% extends 'store/base.html' %}

{% block content %}
<div class="py-12 px-4 max-w-[1200px] mx-auto transition-colors duration-300">
    <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white mb-8">Shopping Cart</h1>

    <!-- 
        This securely loads the product dictionary from Django 
        into a hidden script tag so our JavaScript can read it.
    -->
    <script id="product-data" type="application/json">
        {{ products_json|safe }}
    </script>

    <div class="flex flex-col lg:flex-row gap-8">
        
        <!-- Left Column: Cart Items -->
        <div class="flex-grow bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 transition-all">
            <div id="cart-items-container" class="flex flex-col gap-8">
                <!-- Items will be injected here by JavaScript -->
            </div>
        </div>

        <!-- Right Column: Subtotal & Checkout -->
        <div class="w-full lg:w-[340px] flex-shrink-0">
            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 sticky top-24 transition-all">
                <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Order Summary</h3>
                
                <div class="flex justify-between items-center mb-6">
                    <span class="text-gray-600 dark:text-gray-400">Subtotal (<span id="summary-count" class="font-bold">0</span> items)</span>
                    <span id="summary-total" class="font-bold text-2xl text-gray-900 dark:text-white">৳0.00</span>
                </div>
                
                <!-- Fixed Checkout Link -->
                <a href="{% url 'checkout' %}" class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-3 rounded-xl shadow-md transition-all transform hover:-translate-y-0.5 mb-4">
                    Proceed to checkout
                </a>
                
                <div class="text-xs text-center text-gray-500 dark:text-gray-400 mt-4 leading-relaxed">
                    By placing your order, you agree to The-mRu-store's <a href="#" class="text-blue-600 dark:text-blue-400 hover:underline">privacy notice</a> and <a href="#" class="text-blue-600 dark:text-blue-400 hover:underline">conditions of use</a>.
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        renderCart();
    });

    function renderCart() {
        const container = document.getElementById('cart-items-container');
        const summaryCount = document.getElementById('summary-count');
        const summaryTotal = document.getElementById('summary-total');
        
        // Grab the cart from localStorage and the product data from Django
        let cart = JSON.parse(localStorage.getItem('mRuCart')) || [];
        const productDataRaw = document.getElementById('product-data').textContent;
        const products = JSON.parse(productDataRaw);

        // Premium Empty Cart State
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="text-center py-16">
                    <div class="inline-flex items-center justify-center w-24 h-24 bg-gray-50 dark:bg-gray-700 rounded-full mb-6">
                        <svg class="w-12 h-12 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Your cart is empty</h2>
                    <p class="text-gray-500 dark:text-gray-400 mb-8">Looks like you haven't added anything to your cart yet.</p>
                    <a href="/" class="inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 shadow-sm transition-all transform hover:-translate-y-0.5">
                        Continue shopping
                    </a>
                </div>
            `;
            summaryCount.innerText = "0";
            summaryTotal.innerText = "৳0.00";
            return;
        }

        let html = '';
        let totalItems = 0;
        let totalPrice = 0;

        cart.forEach((item, index) => {
            const product = products[item.productId];
            
            // If the product still exists in the database
            if (product) {
                totalItems += item.quantity;
                totalPrice += (parseFloat(product.price) * item.quantity);

                html += `
                    <div class="flex flex-col sm:flex-row gap-6 border-b border-gray-100 dark:border-gray-700 pb-8 last:border-0 last:pb-0">
                        
                        <!-- Product Image Placeholder -->
                        <div class="w-full sm:w-32 h-40 sm:h-32 bg-gray-50 dark:bg-gray-700 flex-shrink-0 flex items-center justify-center rounded-xl overflow-hidden group">
                             <svg class="w-10 h-10 text-gray-300 dark:text-gray-500 transform group-hover:scale-110 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        
                        <!-- Product Details -->
                        <div class="flex-grow flex flex-col justify-between">
                            <div>
                                <div class="flex flex-col sm:flex-row justify-between items-start gap-4 mb-2">
                                    <a href="/product/${product.id}" class="text-lg font-bold text-gray-900 dark:text-white hover:text-blue-600 dark:hover:text-blue-400 line-clamp-2 transition-colors">
                                        ${product.name}
                                    </a>
                                    <span class="font-black text-xl text-gray-900 dark:text-white flex-shrink-0">৳${product.price}</span>
                                </div>
                                <div class="inline-flex items-center gap-1.5 text-sm text-green-600 dark:text-green-400 font-medium mb-4">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                                    In Stock
                                </div>
                            </div>
                            
                            <!-- Controls -->
                            <div class="flex items-center gap-6 mt-auto">
                                <div class="flex items-center border border-gray-200 dark:border-gray-600 rounded-lg overflow-hidden bg-white dark:bg-gray-800 shadow-sm">
                                    <button onclick="updateQuantity('${product.id}', -1)" class="w-10 h-9 flex items-center justify-center hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 font-medium transition-colors">-</button>
                                    <div class="w-12 h-9 flex items-center justify-center border-x border-gray-200 dark:border-gray-600 text-sm font-bold text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900">${item.quantity}</div>
                                    <button onclick="updateQuantity('${product.id}', 1)" class="w-10 h-9 flex items-center justify-center hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 font-medium transition-colors">+</button>
                                </div>
                                
                                <button onclick="removeFromCart('${product.id}')" class="text-sm font-medium text-red-500 hover:text-red-600 dark:text-red-400 dark:hover:text-red-300 transition-colors flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    Remove
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }
        });

        container.innerHTML = html;
        summaryCount.innerText = totalItems;
        summaryTotal.innerText = `৳${totalPrice.toFixed(2)}`;
    }

    function updateQuantity(productId, change) {
        // 1. We must use the GLOBAL localCart defined in base.html!
        const item = localCart.find(i => i.productId === productId);
        
        if (item) {
            item.quantity += change;
            if (item.quantity <= 0) {
                // If it hits 0, remove it from the global array
                localCart = localCart.filter(i => i.productId !== productId);
            }
            
            // 2. Save to browser memory
            localStorage.setItem('mRuCart', JSON.stringify(localCart));
            
            // 3. Update the UI
            renderCart(); 
            updateCartBadge(); 
            
            // 4. Instantly sync this new change to the MongoDB database!
            if (typeof pushCartToDB === 'function') pushCartToDB();
        }
    }

    function removeFromCart(productId) {
        // 1. Filter it out of the GLOBAL localCart
        localCart = localCart.filter(i => i.productId !== productId);
        
        // 2. Save to browser memory
        localStorage.setItem('mRuCart', JSON.stringify(localCart));
        
        // 3. Update the UI
        renderCart(); 
        updateCartBadge(); 
        
        // 4. Instantly sync this deletion to the MongoDB database!
        if (typeof pushCartToDB === 'function') pushCartToDB();
    }
</script>
{% endblock %}
