<!-- Reusable Breadcrumb Navigation -->
<nav class="flex text-sm text-gray-500 dark:text-gray-400 mb-4" aria-label="Breadcrumb">
    <ol class="inline-flex items-center space-x-1 md:space-x-3">
        <li class="inline-flex items-center">
            <a href="{% url 'catalog' %}" class="inline-flex items-center hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                Home
            </a>
        </li>
        <!-- Dynamic Category (Passed from the backend) -->
        {% if category_name %}
        <li>
            <div class="flex items-center">
                <svg class="w-5 h-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                <a href="#" class="ml-1 hover:text-blue-600 dark:hover:text-blue-400 md:ml-2 transition-colors">{{ category_name }}</a>
            </div>
        </li>
        {% endif %}
        <!-- Dynamic Product (Passed from the backend) -->
        {% if product_name %}
        <li aria-current="page">
            <div class="flex items-center">
                <svg class="w-5 h-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                <span class="ml-1 text-gray-900 dark:text-gray-200 md:ml-2 font-medium truncate max-w-[200px]">{{ product_name }}</span>
            </div>
        </li>
        {% endif %}
    </ol>
</nav>
